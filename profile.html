<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="profile.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <script type="module" src="profile.js"></script>
</head>
<body>



    <div class="profile-container">
        <div class="profile-header">
            <img id="user-pic" src="C:\Users\Rig\Source\Repos\VersaHelp-SP\images\Profile\Male.webp" alt="Profile">
            <div>
                <div id="user-name-display">Guest</div>
                <p>Email: <span id="user-email"></span></p>
            </div>
        </div>
        <h3>Update Profile Picture</h3>
        <input type="file" id="profile-pic-input" accept="image/*">
        <button id="upload-pic-btn">Upload Picture</button>


        <h3>Update Profile</h3>
        <input type="text" id="update-name" placeholder="Update Name">
        <input type="text" id="update-phone" placeholder="Update Phone Number">
        <button id="update-profile-btn">Save Changes</button>

        <h3>Your Service Orders</h3>
        <div class="order-history" id="order-list">
            <p>No orders found.</p>
        </div>

        <h3>Leave Feedback</h3>
        <textarea id="feedback-text" rows="3" placeholder="Write your feedback..."></textarea>
        <button id="feedback-btn">Submit Feedback</button>

        <h3>Your Feedback</h3>
        <div class="order-history" id="feedback-list">
            <p>No feedback submitted yet.</p>
        </div>


        <button id="logout-btn" style="background:red; margin-top:20px;">Logout</button>
    </div>

    <script type="module" src="js/profile.js"></script>
</body>
</html>
